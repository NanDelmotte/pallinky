name: Mobile iOS Dev Build (EAS)

on:
  workflow_dispatch:

jobs:
  build-ios-dev:
    name: Build iOS (development)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS development with EAS
        working-directory: apps/mobile
        env:
          EXPO_NO_CAPABILITY_SYNC: "1"
        run: npm run validate-env:development && eas build --profile development --platform ios --non-interactive
